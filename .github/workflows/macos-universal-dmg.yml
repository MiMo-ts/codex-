name: macOS Universal DMG

on:
  push:
    branches: [main]
    paths:
      - "apps/codex-plus-manager/**"
      - "apps/codex-plus-launcher/**"
      - "apps/codex-plus-mobile-relay/**"
      - "crates/codex-plus-core/**"
      - "crates/codex-plus-data/**"
      - "scripts/installer/macos/**"
      - ".github/workflows/macos-universal-dmg.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos-universal-dmg:
    name: Build Universal DMG (x86_64 + arm64)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust (multi-target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Show toolchain
        run: |
          rustc --version
          rustup target list --installed
          xcrun --show-sdk-path
          clang --target=aarch64-apple-darwin -E -x c - </dev/null > /dev/null && \
            echo "clang aarch64 OK" || (echo "clang aarch64 FAIL" && exit 1)

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm install --package-lock=false

      - name: Build frontend (Vite)
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Build x86_64 binaries (cross compile on Apple Silicon runner)
        run: |
          cargo build --release --target x86_64-apple-darwin \
            -p codex-plus-launcher -p codex-plus-manager

      - name: Build aarch64 binaries (native)
        run: |
          cargo build --release --target aarch64-apple-darwin \
            -p codex-plus-launcher -p codex-plus-manager

      - name: Sanity check architectures
        run: |
          file target/x86_64-apple-darwin/release/codex-plus-plus
          file target/aarch64-apple-darwin/release/codex-plus-plus
          lipo -info target/x86_64-apple-darwin/release/codex-plus-plus
          lipo -info target/aarch64-apple-darwin/release/codex-plus-plus

      - name: Build universal DMG
        run: |
          chmod +x scripts/installer/macos/package-dmg-universal.sh
          bash scripts/installer/macos/package-dmg-universal.sh

      - name: List DMG artifact
        run: ls -lh dist/macos/*.dmg

      - name: Mount & verify DMG
        run: |
          set -euo pipefail
          DMG=$(ls dist/macos/CodexPlusPlus-*-macos-universal.dmg)
          echo "verifying: $DMG"
          hdiutil attach -readonly -nobrowse "$DMG"
          for app in "/Volumes/Codex++/Codex++.app" "/Volumes/Codex++/Codex++ 管理工具.app"; do
            plutil -lint "$app/Contents/Info.plist" >/dev/null
            codesign -dv "$app" >/dev/null 2>&1
            exec_name="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")"
            lipo -info "$app/Contents/MacOS/$exec_name"
            echo "✓ verified: $app"
          done
          hdiutil detach "/Volumes/Codex++"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-plus-plus-macos-universal
          path: dist/macos/CodexPlusPlus-*-macos-universal.dmg
          if-no-files-found: error
          retention-days: 14
