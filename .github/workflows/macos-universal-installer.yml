name: macOS Universal Installer (.pkg)

# Single .pkg installer that auto-installs BOTH Codex++ and Codex++ 管理工具
# to /Applications in one shot. Runs natively on Intel (x86_64) and
# Apple Silicon (arm64) Macs via lipo-built universal binaries.
#
# Triggers:
#   • push to main     → build + verify + live install/uninstall (artifact only)
#   • tag v*           → additionally create / update GitHub Release with .pkg
#   • PR to main       → build + verify (no install)
#   • workflow_dispatch → manual build + optional release via workflow input

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - "apps/codex-plus-manager/**"
      - "apps/codex-plus-launcher/**"
      - "apps/codex-plus-mobile-relay/**"
      - "crates/codex-plus-core/**"
      - "crates/codex-plus-data/**"
      - "scripts/installer/macos/**"
      - ".github/workflows/macos-universal-installer.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create / update GitHub Release with the .pkg asset"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  macos-universal-installer:
    name: Build Universal .pkg installer (x86_64 + arm64, both apps)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust (multi-target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Sanity check toolchain
        run: |
          rustc --version
          rustup target list --installed
          xcrun --show-sdk-path
          clang --target=aarch64-apple-darwin -E -x c - </dev/null > /dev/null \
            && echo "clang aarch64 OK" \
            || (echo "clang aarch64 FAIL" && exit 1)

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm install --package-lock=false

      - name: Build frontend (Vite)
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Build x86_64 binaries (cross compile on Apple Silicon runner)
        run: |
          cargo build --release --target x86_64-apple-darwin \
            -p codex-plus-launcher -p codex-plus-manager

      - name: Build aarch64 binaries (native)
        run: |
          cargo build --release --target aarch64-apple-darwin \
            -p codex-plus-launcher -p codex-plus-manager

      - name: Confirm architecture presence
        run: |
          file target/x86_64-apple-darwin/release/codex-plus-plus
          file target/aarch64-apple-darwin/release/codex-plus-plus
          lipo -info target/x86_64-apple-darwin/release/codex-plus-plus
          lipo -info target/aarch64-apple-darwin/release/codex-plus-plus

      - name: Build universal .dmg (primary, drag-and-drop install — bypasses .pkg Gatekeeper friction)
        run: |
          # Route to a subdir so the .pkg build's rm -rf doesn't wipe the .dmg out.
          mkdir -p dist/macos/dmg
          chmod +x scripts/installer/macos/package-dmg-universal.sh
          OUT_DIR=dist/macos/dmg bash scripts/installer/macos/package-dmg-universal.sh

      - name: Build universal .pkg installer (alternative, one-click install via sudo installer)
        run: |
          mkdir -p dist/macos/pkg
          chmod +x scripts/installer/macos/package-pkg-universal.sh
          OUT_DIR=dist/macos/pkg bash scripts/installer/macos/package-pkg-universal.sh

      - name: Collect artifacts to dist/macos/
        run: |
          # Each script wiped its own OUT_DIR; pull their outputs up to dist/macos/
          # so the upload step's globs pick them up together.
          set -euo pipefail
          [ -d dist/macos/dmg ] && mv dist/macos/dmg/*.dmg dist/macos/ || echo "no dmg dir"
          [ -d dist/macos/pkg ] && mv dist/macos/pkg/*.pkg dist/macos/ || echo "no pkg dir"
          rm -rf dist/macos/dmg dist/macos/pkg

          ls -lh dist/macos/
          DMG="$(ls dist/macos/CodexPlusPlus-*-macos-universal.dmg | head -1 || true)"
          PKG="$(ls dist/macos/CodexPlusPlus-*-macos-universal.pkg | head -1 || true)"
          [ -n "$DMG" ] && echo "DMG=$DMG ($(stat -f %z "$DMG") bytes)"
          [ -n "$PKG" ] && echo "PKG=$PKG ($(stat -f %z "$PKG") bytes)"
          [ -n "$DMG" ] && [ -n "$PKG" ] || { echo "ERROR: missing dmg or pkg"; exit 1; }
        id: pkg

      - name: List installer artifact
        run: |
          ls -lh dist/macos/*.pkg
          PKG="$(ls dist/macos/CodexPlusPlus-*-macos-universal.pkg | head -1)"
          echo "PKG=$PKG"
          echo "PKG_SIZE=$(stat -f %z "$PKG")"
          echo "PKG_SHA=$(shasum -a 256 "$PKG" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
        id: pkg

      - name: Inspect installer payload (no install)
        run: |
          set -euo pipefail
          PKG="$(ls dist/macos/CodexPlusPlus-*-macos-universal.pkg | head -1)"
          echo "Verifying payload of: $PKG"

          # Capture payload once
          PAYLOAD="$(pkgutil --payload-files "$PKG")"
          echo "$PAYLOAD" | head -40

          # Bulletproof fixed-string match — no regex escaping needed
          echo "$PAYLOAD" | grep -Fxq './Applications/Codex++.app' \
            || { echo "MISSING: Codex++.app"; exit 1; }
          echo "$PAYLOAD" | grep -Fxq './Applications/Codex++ 管理工具.app' \
            || { echo "MISSING: 管理工具.app"; exit 1; }

          # Also count .app directories to be safe
          APP_COUNT="$(printf '%s\n' "$PAYLOAD" | awk -F/ '/\.app$/ {n++} END {print n+0}')"
          echo "  - distinct .app directory lines: $APP_COUNT"
          [ "$APP_COUNT" -ge 2 ] || { echo "expected >=2 .app directory lines, got $APP_COUNT"; exit 1; }

          echo "✓ payload contains both .app bundles"

      - name: Expand .pkg and verify universal binaries inside
        run: |
          set -euo pipefail
          PKG="$(ls dist/macos/CodexPlusPlus-*-macos-universal.pkg | head -1)"
          EXPAND="/tmp/codexplus-install-expand"
          rm -rf "$EXPAND" && mkdir -p "$EXPAND"
          pkgutil --expand-full "$PKG" "$EXPAND/expanded"

          for app in "Codex++.app" "Codex++ 管理工具.app"; do
            BIN_NAME="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$EXPAND/expanded/Payload/Applications/$app/Contents/Info.plist")"
            BIN_PATH="$EXPAND/expanded/Payload/Applications/$app/Contents/MacOS/$BIN_NAME"
            echo "--- $app"
            file "$BIN_PATH"
            lipo -info "$BIN_PATH"
            /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$EXPAND/expanded/Payload/Applications/$app/Contents/Info.plist"
            /usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$EXPAND/expanded/Payload/Applications/$app/Contents/Info.plist"
            plutil -lint "$EXPAND/expanded/Payload/Applications/$app/Contents/Info.plist"
            codesign -dv "$EXPAND/expanded/Payload/Applications/$app" 2>&1 | head -6
          done

      - name: Live install to /Applications, verify, then uninstall
        run: |
          set -euo pipefail
          PKG="$(ls dist/macos/CodexPlusPlus-*-macos-universal.pkg | head -1)"

          echo "==> pre-install: should NOT exist yet"
          [ ! -d "/Applications/Codex++.app" ]          || { echo "leftover Codex++.app"; exit 1; }
          [ ! -d "/Applications/Codex++ 管理工具.app" ] || { echo "leftover 管理工具.app"; exit 1; }

          echo "==> installing $PKG"
          sudo installer -pkg "$PKG" -target / -verbose

          echo "==> post-install: both apps must be present"
          for app in "Codex++.app" "Codex++ 管理工具.app"; do
            test -d "/Applications/$app" || { echo "MISSING /Applications/$app"; exit 1; }
            BIN_NAME="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "/Applications/$app/Contents/Info.plist")"
            BIN_PATH="/Applications/$app/Contents/MacOS/$BIN_NAME"
            file "$BIN_PATH"
            lipo -info "$BIN_PATH"
            codesign -dv "/Applications/$app" 2>&1 | head -4
          done

          echo "==> uninstall: removing both .app bundles (sudo needed, root:wheel)"
          # Cleanup must not fail the workflow even if sudo errors; the install
          # itself succeeded above which is the real assertion.
          sudo rm -rf "/Applications/Codex++.app" "/Applications/Codex++ 管理工具.app" || \
            echo "warning: uninstall rm returned non-zero (ignored)"

          # Forget package receipt so subsequent runs don't see a stale install
          sudo pkgutil --forget "com.bigpizzav3.codexplusplus" 2>/dev/null || true

          echo "==> post-uninstall: cleanup state (informational)"
          if [ -d "/Applications/Codex++.app" ];          then echo "  note: /Applications/Codex++.app still present"; fi
          if [ -d "/Applications/Codex++ 管理工具.app" ]; then echo "  note: /Applications/Codex++ 管理工具.app still present"; fi
          echo "✓ live install regression finished"

      - name: Cleanup expand dir
        run: rm -rf /tmp/codexplus-install-expand

      - name: Upload installer artifact(s)
        uses: actions/upload-artifact@v4
        with:
          name: codex-plus-plus-macos-universal
          path: |
            dist/macos/CodexPlusPlus-*-macos-universal.dmg
            dist/macos/CodexPlusPlus-*-macos-universal.pkg
          if-no-files-found: error
          retention-days: 14

      - name: Publish to GitHub Release (tag builds only)
        if: |
          startsWith(github.ref, 'refs/tags/v')
          || (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Codex++ ${{ github.ref_name }} (macOS Universal)"
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## Codex++ ${{ github.ref_name }} — macOS Universal (Intel + Apple Silicon)

            **One download. Native on both architectures. Drag-and-drop install.**

            | Asset | Size | Recommendation |
            |---|---|---|
            | **`CodexPlusPlus-1.2.21-macos-universal.dmg`** | ~29 MB | **Preferred** — double-click → drag both `.app` into `/Applications` |
            | `CodexPlusPlus-1.2.21-macos-universal.pkg` | ~26 MB | Auto-installer via `sudo installer -pkg ... -target /` |

            The `.dmg` is ad-hoc signed and **does not trip Gatekeeper** the way a `.pkg` does.
            You can drag the apps straight from the mounted image; for first launch only,
            right-click the app → **Open** → **Open** to whitelist (this persists).

            ### Install — recommended (.dmg)
            1. Download `CodexPlusPlus-1.2.21-macos-universal.dmg` below.
            2. Double-click to mount the image → a Finder window pops up showing two apps
               and an `Applications` symlink.
            3. Drag **both** `Codex++` and `Codex++ 管理工具` into the `Applications` shortcut.
            4. Launch `Codex++ 管理工具.app` from Launchpad.
               - First time macOS Gatekeeper may ask; **right-click → Open → Open** once to remember.

            ### Install — one-liner (.dmg, no Finder needed)
            ```bash
            curl -fL https://raw.githubusercontent.com/MiMo-ts/codex-/main/scripts/installer/macos/install.sh | bash
            ```

            ### Install — `.pkg` (auto, no drag)
            ```bash
            curl -fLO "https://github.com/MiMo-ts/codex-/releases/download/v1.2.21-macos/CodexPlusPlus-1.2.21-macos-universal.pkg"
            xattr -cr CodexPlusPlus-1.2.21-macos-universal.pkg
            sudo installer -pkg CodexPlusPlus-1.2.21-macos-universal.pkg -target /
            ```

            ### Architecture
            - `lipo -info` on either executable should report: `x86_64 arm64`
            - Single fat binary, no Rosetta needed on Apple Silicon.

            > Bundle is **ad-hoc signed** (no Apple Developer ID); a "from an unidentified
            > developer" prompt on first launch is expected and one-time. Right-click → Open
            > is the official workaround until notarization is added.
          files: |
            dist/macos/CodexPlusPlus-*-macos-universal.dmg
            dist/macos/CodexPlusPlus-*-macos-universal.pkg
          fail_on_unmatched_files: true

      - name: Smoke summary
        run: |
          echo "## macOS Universal installers ready"
          echo ""
          echo "- .dmg (drag-and-drop) and .pkg (auto-install) both produced"
          echo "- Both run natively on Intel (x86_64) and Apple Silicon (arm64)"
          echo "- Built via lipo'd universal binaries"
          echo ""
          ls -lh dist/macos/CodexPlusPlus-*-macos-universal.* 2>&1
          echo ""
          ls -lh dist/macos/CodexPlusPlus-*-macos-universal.pkg
